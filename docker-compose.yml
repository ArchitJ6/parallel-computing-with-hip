services:
  cuda-dev:
    build: .
    container_name: hip_cuda_lab
    working_dir: /workspace

    volumes:
      - .:/workspace

    tty: true
    stdin_open: true

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    command: bash